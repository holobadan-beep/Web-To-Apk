name: Build APK

# Dipicu oleh buildbot/queue.js melalui triggerWorkflow(browserUrl, tag, buildType)
# di buildbot/github.js (menu/build.js baris ~1072 & ~802).
#
# Kontrak input HARUS sama persis dengan nama key yang dikirim di body
# `{ ref, inputs: {...} }` pada saat POST ke
# /repos/{owner}/{repo}/actions/workflows/build.yml/dispatches.
# Kalau di github.js kamu pakai nama key lain, tinggal samain di bawah ini.
on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "Browser/asset download URL ke ZIP source project (release asset yang di-upload uploadZipToRelease)"
        required: true
        type: string
      tag:
        description: "Tag unik build ini (dipakai buat penamaan artifact & korelasi run)"
        required: true
        type: string
      build_type:
        description: "Jenis build"
        required: true
        type: choice
        options:
          - debug
          - release
        default: release

concurrency:
  group: build-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ inputs.build_type }}) — ${{ inputs.tag }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─── Unduh ZIP source project dari GitHub Release ──────────────────────
      # Pakai GITHUB_TOKEN bawaan Actions (auto-tersedia, gak perlu secret
      # tambahan) supaya tetep jalan walau repo backend-nya private.
      - name: Download source zip
        run: |
          set -e
          echo "Mengunduh source project..."
          HTTP_CODE=$(curl -sL -w "%{http_code}" -o source.zip \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ inputs.zip_url }}")

          if [ "$HTTP_CODE" != "200" ] || [ ! -s source.zip ]; then
            echo "::error::Gagal download zip_url (HTTP $HTTP_CODE) atau file kosong."
            exit 1
          fi
          echo "Ukuran source.zip: $(du -h source.zip | cut -f1)"

      # ─── Ekstrak & cari root folder project Flutter yang sebenarnya ───────
      # ZIP yang di-upload user kadang punya 1 folder pembungkus di root,
      # kadang enggak. Kita cari folder yang punya pubspec.yaml.
      #
      # FIX: sebelumnya pakai `find ... | head -n1 | xargs -r dirname`.
      # Kalau di dalam ZIP ada LEBIH DARI SATU pubspec.yaml (mis. project
      # utama + folder contoh/plugin/dependency bawaan yang ikut ke-zip),
      # kombinasi itu bisa menghasilkan PROJECT_DIR multi-baris (contoh
      # nyata: "project" + "mercy" pada baris terpisah). Baris kedua yang
      # nyasar itu lalu ikut ditulis ke $GITHUB_OUTPUT dan bikin step gagal
      # dengan "Invalid format" karena bukan format key=value.
      # `-print -quit` bikin find BERHENTI TOTAL begitu match pertama
      # ditemukan, jadi hasilnya dijamin cuma satu baris, apa pun isi ZIP-nya.
      - name: Extract project
        id: extract
        run: |
          set -e
          mkdir -p project
          unzip -q source.zip -d project

          PROJECT_DIR=$(find project -maxdepth 4 -name "pubspec.yaml" -not -path "*/build/*" -print -quit | xargs -r dirname)

          if [ -z "$PROJECT_DIR" ]; then
            echo "::error::pubspec.yaml gak ketemu di dalam ZIP. Pastikan ini project Flutter yang valid."
            find project -maxdepth 3 -type d
            exit 1
          fi

          echo "Project ditemukan di: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          cache: true

      - name: Flutter pub get
        working-directory: ${{ steps.extract.outputs.project_dir }}
        run: flutter pub get

      - name: Flutter build apk (${{ inputs.build_type }})
        working-directory: ${{ steps.extract.outputs.project_dir }}
        run: |
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      # ─── Kumpulkan hasil APK ────────────────────────────────────────────────
      # FIX defensif: pola `find | head -n1` yang sama seperti di step
      # "Extract project" diganti `-print -quit`, supaya tetap aman kalau
      # nanti folder output APK berisi lebih dari satu file .apk.
      - name: Collect APK output
        id: collect
        run: |
          set -e
          OUT_DIR="${{ steps.extract.outputs.project_dir }}/build/app/outputs/flutter-apk"
          APK_PATH=$(find "$OUT_DIR" -maxdepth 1 -name "*.apk" -print -quit)

          if [ -z "$APK_PATH" ]; then
            echo "::error::Gak ada file .apk hasil build ditemukan di $OUT_DIR"
            exit 1
          fi

          mkdir -p artifact-output
          FINAL_NAME="app-${{ inputs.build_type }}-${{ inputs.tag }}.apk"
          cp "$APK_PATH" "artifact-output/$FINAL_NAME"
          echo "APK siap: $FINAL_NAME ($(du -h "artifact-output/$FINAL_NAME" | cut -f1))"

      # Nama artifact SENGAJA mengandung kata "apk"/"build" karena
      # menu/build.js mencocokkan artifact lewat:
      #   a.name.toLowerCase().includes("apk") || a.name.toLowerCase().includes("build")
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build-${{ inputs.tag }}
          path: artifact-output/*.apk
          retention-days: 1
          if-no-files-found: error
